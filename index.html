        function generatePattern() {
            // 参数读取
            const shape = document.getElementById('gen-shape').value;
            const layoutMode = document.getElementById('gen-layout') ? document.getElementById('gen-layout').value : 'horizontal';

            // 获取用户选择的主色，但不一定完全依赖，为了丰富性我们会生成调色板
            const userC1 = document.getElementById('gen-color1').value; // 主色
            const userC2 = document.getElementById('gen-color2').value; // 底色
            
            // 扩展调色板：基于黎锦常见的 红、黄、黑、蓝、白
            // 我们基于 userC1 生成一个相近色系，再混合传统色
            const colorPalette = [
                userC1,
                userC2,
                '#D4AF37', // 金/黄
                '#1A1A1A', // 黑 (黎锦常用底或线)
                '#F0F0F0', // 白 (提亮)
                '#173B52'  // 藏蓝
            ];
            const randColor = () => colorPalette[Math.floor(Math.random() * colorPalette.length)];

            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 1. 底色填充
            ctx.fillStyle = userC2;
            ctx.fillRect(0,0,size,size);
            
            // 2. 模拟织物纹理 (Noise + Grid)
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = '#000';
            // 经纬线
            for(let i=0; i<size; i+=3) {
                if(Math.random()>0.5) ctx.fillRect(0, i, size, 1);
                else ctx.fillRect(i, 0, 1, size);
            }
            ctx.globalAlpha = 1.0;

            // 几何绘图工具函数
            // 定义黎锦四大纹样绘制函数
            // 1. 人纹 (Human/Ancestor) - 抽象人形，双手举起，双腿蹲踞
            const drawHuman = (ctx, x, y, size, color) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = color;
                ctx.lineWidth = size * 0.08;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                const s = size * 0.4;
                
                // 头部 (菱形)
                ctx.beginPath();
                ctx.moveTo(0, -s);
                ctx.lineTo(s*0.3, -s*0.7);
                ctx.lineTo(0, -s*0.4);
                ctx.lineTo(-s*0.3, -s*0.7);
                ctx.closePath();
                ctx.stroke();
                
                // 身体 (简单直线 + 内部点缀)
                ctx.beginPath();
                ctx.moveTo(0, -s*0.4);
                ctx.lineTo(0, s*0.4);
                ctx.stroke();
                
                // 手臂 (W形 / 举手)
                ctx.beginPath();
                ctx.moveTo(-s*0.8, -s*0.2); // 左手
                ctx.lineTo(-s*0.4, -s*0.4); // 左肘
                ctx.lineTo(0, -s*0.2);      // 肩
                ctx.lineTo(s*0.4, -s*0.4);  // 右肘
                ctx.lineTo(s*0.8, -s*0.2);  // 右手
                ctx.stroke();
                
                // 手指装饰 (简单的梳齿状)
                const handS = s*0.2;
                ctx.lineWidth = size * 0.05;
                // 左手
                ctx.beginPath(); ctx.moveTo(-s*0.8, -s*0.2); ctx.lineTo(-s*0.8, -s*0.2-handS); ctx.stroke();
                // 右手
                ctx.beginPath(); ctx.moveTo(s*0.8, -s*0.2); ctx.lineTo(s*0.8, -s*0.2-handS); ctx.stroke();

                // 腿部 (M形 / 蹲踞)
                ctx.lineWidth = size * 0.08;
                ctx.beginPath();
                ctx.moveTo(-s*0.8, s*0.8);  // 左脚
                ctx.lineTo(-s*0.4, s*0.4);  // 左膝
                ctx.lineTo(0, s*0.4);       // 胯
                ctx.lineTo(s*0.4, s*0.4);   // 右膝
                ctx.lineTo(s*0.8, s*0.8);   // 右脚
                ctx.stroke();
                
                ctx.restore();
            };

            // 2. 蛙纹 (Frog/Fertility) - 几何化的青蛙，象征多子多福
            const drawFrog = (ctx, x, y, size, color) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = size * 0.06;
                
                const s = size * 0.45;
                
                // 身体 (菱形)
                ctx.beginPath();
                ctx.moveTo(0, -s*0.3);
                ctx.lineTo(s*0.3, 0);
                ctx.lineTo(0, s*0.3);
                ctx.lineTo(-s*0.3, 0);
                ctx.closePath();
                ctx.stroke();
                // 身体中心点
                ctx.beginPath(); ctx.arc(0,0, s*0.1, 0, Math.PI*2); ctx.fill();

                // 四肢 (X形向外延伸，末端有折角)
                // 左上
                ctx.beginPath(); 
                ctx.moveTo(-s*0.3, -s*0.1); 
                ctx.lineTo(-s*0.7, -s*0.5); 
                ctx.lineTo(-s*0.9, -s*0.3); // 爪子折角
                ctx.stroke();
                // 右上
                ctx.beginPath(); 
                ctx.moveTo(s*0.3, -s*0.1); 
                ctx.lineTo(s*0.7, -s*0.5); 
                ctx.lineTo(s*0.9, -s*0.3); 
                ctx.stroke();
                // 左下
                ctx.beginPath(); 
                ctx.moveTo(-s*0.3, s*0.1); 
                ctx.lineTo(-s*0.7, s*0.5); 
                ctx.lineTo(-s*0.9, s*0.3); 
                ctx.stroke();
                // 右下
                ctx.beginPath(); 
                ctx.moveTo(s*0.3, s*0.1); 
                ctx.lineTo(s*0.7, s*0.5); 
                ctx.lineTo(s*0.9, s*0.3); 
                ctx.stroke();
                
                // 头部 (上方三角形)
                ctx.beginPath();
                ctx.moveTo(-s*0.15, -s*0.35);
                ctx.lineTo(s*0.15, -s*0.35);
                ctx.lineTo(0, -s*0.6);
                ctx.fill();

                ctx.restore();
            };

            // 3. 花章纹 (Flower/Emblem) - 几何化的花朵/八角星，类似 X 形状
            const drawFlower = (ctx, x, y, size, color) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = color;
                ctx.lineWidth = size * 0.06;
                
                const s = size * 0.4;
                
                // 中心 X 骨架
                ctx.beginPath();
                ctx.moveTo(-s, -s); ctx.lineTo(s, s);
                ctx.moveTo(s, -s); ctx.lineTo(-s, s);
                ctx.stroke();
                
                // 末端装饰 (V形)
                const d = s * 0.3;
                const ends = [
                    [-s, -s, 1, 1], [s, -s, -1, 1],
                    [-s, s, 1, -1], [s, s, -1, -1]
                ];
                
                ends.forEach(pos => {
                    const [px, py, dx, dy] = pos;
                    ctx.beginPath();
                    ctx.moveTo(px + dx*d, py);
                    ctx.lineTo(px, py);
                    ctx.lineTo(px, py + dy*d);
                    ctx.stroke();
                });
                
                // 中心菱形
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(0, -s*0.4); ctx.lineTo(s*0.4, 0); ctx.lineTo(0, s*0.4); ctx.lineTo(-s*0.4, 0);
                ctx.fill();
                
                // 内部镂空点
                ctx.fillStyle = '#fff'; // 假设花心是亮的
                ctx.beginPath(); ctx.arc(0,0, s*0.15, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            };

            // 4. 几何纹 (Geometry) - 多重嵌套菱形/雷纹
            const drawGeometric = (ctx, x, y, size, color) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = color;
                ctx.lineWidth = size * 0.05;
                
                const s = size * 0.45;
                
                // 外层菱形
                ctx.beginPath();
                ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
                ctx.closePath();
                ctx.stroke();
                
                // 中层 (四角矩形装饰)
                const q = s * 0.5;
                // 上
                ctx.strokeRect(-q*0.3, -q - q*0.3, q*0.6, q*0.6);
                // 下
                ctx.strokeRect(-q*0.3, q - q*0.3, q*0.6, q*0.6);
                // 左
                ctx.strokeRect(-q - q*0.3, -q*0.3, q*0.6, q*0.6);
                // 右
                ctx.strokeRect(q - q*0.3, -q*0.3, q*0.6, q*0.6);

                // 内层嵌套菱形
                ctx.beginPath();
                ctx.moveTo(0, -s*0.6); ctx.lineTo(s*0.6, 0); ctx.lineTo(0, s*0.6); ctx.lineTo(-s*0.6, 0);
                ctx.closePath();
                ctx.stroke();

                // 核心实心菱形
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(0, -s*0.3); ctx.lineTo(s*0.3, 0); ctx.lineTo(0, s*0.3); ctx.lineTo(-s*0.3, 0);
                ctx.fill();

                ctx.restore();
            };

            const drawZigZag = (y, h, color, lineWidth=2, xStart=0, xEnd=size) => {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                const waveW = h * 0.8;
                // 确保波纹连续性，从 waveW 整数倍开始
                const start = Math.floor(xStart / waveW) * waveW;
                for(let x=start; x<=xEnd; x+=waveW) {
                    ctx.lineTo(x + waveW/2, y);
                    ctx.lineTo(x + waveW, y+h);
                }
                ctx.stroke();
            };
            
            const drawGreatWall = (y, h, color, xStart=0, xEnd=size) => {
                // 长城纹/回字纹
                ctx.lineWidth = h * 0.15;
                ctx.strokeStyle = color;
                ctx.lineCap = 'square';
                const step = h * 1.5;
                ctx.beginPath();
                let up = true;
                const start = Math.floor(xStart / step) * step;
                
                for(let x=start; x<=xEnd; x+=step) {
                    if(up) {
                        ctx.moveTo(x, y+h); ctx.lineTo(x, y); ctx.lineTo(x+step/2, y); ctx.lineTo(x+step/2, y+h);
                    } else {
                        // 简化版方波
                        ctx.moveTo(x, y); ctx.lineTo(x, y+h); ctx.lineTo(x+step/2, y+h); ctx.lineTo(x+step/2, y);
                    }
                }
                ctx.stroke();
            };

            const drawMotifRow = (y, h, type, color, xStart=0, xEnd=size) => {
                const step = h * 1.5; // 间距稍微拉大一点
                // 计算起始点，保证对齐
                let start = (Math.ceil(xStart/step)*step) + step/2;
                if(start < xStart) start += step;
                
                for(let x=start; x<xEnd; x+=step) {
                    // 调用对应的绘制函数
                    if (type === 'human') {
                        drawHuman(ctx, x, y + h/2, h, color);
                    } else if (type === 'frog') {
                        drawFrog(ctx, x, y + h/2, h, color);
                    } else if (type === 'flower') {
                        drawFlower(ctx, x, y + h/2, h, color);
                    } else if (type === 'geometry') {
                        drawGeometric(ctx, x, y + h/2, h, color);
                    } else {
                        // 默认菱形
                        drawGeometric(ctx, x, y + h/2, h, color);
                    }
                }
            };

            // 3. 复杂图案逻辑：根据布局绘制 (Bands Generation vs Cross Generation)
            
            if (layoutMode === 'horizontal') {
                // 原有逻辑：水平条带
                let currentY = 0;
                while(currentY < size) {
                    // 随机选择条带高度
                    const isMain = Math.random() < 0.2; // 20% 主图
                    let h = isMain ? Math.random() * 80 + 60 : Math.random() * 20 + 10;
                    if (currentY + h > size) h = size - currentY;
                    
                    // 绘制条带背景
                    const bandColor = Math.random() > 0.6 ? userC2 : randColor();
                    ctx.fillStyle = bandColor;
                    ctx.fillRect(0, currentY, size, h);
                    
                    // 绘制条带内容
                    if(isMain) {
                        // 主纹样：菱形、人形、几何
                        drawMotifRow(currentY, h, shape, randColor());
                        // 边框修饰
                        ctx.strokeStyle = randColor(); ctx.lineWidth = 2;
                        ctx.strokeRect(0, currentY+2, size, h-4);
                    } else {
                        // 辅纹样：线条、锯齿、长城纹
                        const type = Math.floor(Math.random() * 4);
                        const decorColor = randColor();
                        if(type === 0) {
                            // 纯直线
                            ctx.fillStyle = decorColor;
                            ctx.fillRect(0, currentY + h/4, size, h/2);
                        } else if (type === 1) {
                            // 锯齿
                            drawZigZag(currentY + h * 0.2, h*0.6, decorColor);
                        } else if (type === 2) {
                            // 长城纹
                            drawGreatWall(currentY + h * 0.2, h*0.6, decorColor);
                        } else {
                            // 虚线点
                            ctx.fillStyle = decorColor;
                            for(let i=0; i<size; i+=h*2) ctx.fillRect(i, currentY+h/3, h, h/3);
                        }
                    }
                    
                    currentY += h;
                }
            } 
            else if (layoutMode === 'cross') {
                // 交叉菱格布局
                // 1. 绘制大菱形网格背景
                const gridSize = 140; // 增大网格
                ctx.strokeStyle = userC1;
                ctx.lineWidth = 6;
                // 背景填充
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = userC1;
                ctx.fillRect(0,0,size,size);
                ctx.globalAlpha = 1.0;
                
                // 菱格底纹只需要绘制线条
                ctx.beginPath();
                // \ lines
                for (let i = -size; i < size * 2; i += gridSize) {
                     ctx.moveTo(i, 0); ctx.lineTo(i + size, size); 
                }
                // / lines
                for (let i = -size; i < size * 2; i += gridSize) {
                     ctx.moveTo(i, 0); ctx.lineTo(i - size, size); 
                }
                ctx.stroke();

                // 2. 在交点处绘制纹样 - 独立单元格绘制，不使用横向函数
                for (let y = 0; y < size + gridSize; y += gridSize/2) {
                    // 交错行
                    const toggle = Math.floor(y / (gridSize/2)) % 2 === 0;
                    
                    for (let x = (toggle?0:gridSize/2) - gridSize; x < size + gridSize; x += gridSize) {
                        
                         ctx.save();
                         ctx.translate(x, y);
                         // 旋转成菱形
                         ctx.rotate(Math.PI / 4);
                         
                         const blockSize = gridSize * 0.45;

                        // 边框强调
                         ctx.strokeStyle = userC2;
                         ctx.lineWidth = 4;
                         ctx.strokeRect(-blockSize, -blockSize, blockSize*2, blockSize*2);
                         
                         // 随机填充色块
                         if(Math.random() > 0.3) {
                             ctx.fillStyle = randColor();
                             ctx.fillRect(-blockSize, -blockSize, blockSize*2, blockSize*2);
                         }

                         // 内部绘制图案
                         if(Math.random() > 0.4) {
                             ctx.rotate(-Math.PI / 4); // 转回正向绘制图案
                             
                             const subScale = 0.6;
                             // 适配新的绘制函数，它们不需要 context scale (或者需要我们手动调整)
                             // 但为了方便复用，我们这里传递一个较大的 size，然后通过 scale 缩小
                             // 或者直接用我们的绘制函数，因为它们接受 size 参数
                             
                             // 恢复缩放，因为 drawXXX 函数内部使用 size
                             // ctx.scale(subScale, subScale); 
                             
                             const patternSize = gridSize * 0.45; // 稍微小一点适应格子
                             
                             if(shape === 'human') {
                                drawHuman(ctx, 0, 0, patternSize, '#fff');
                             } else if (shape === 'frog') {
                                drawFrog(ctx, 0, 0, patternSize, '#aaffaa');
                             } else if (shape === 'flower') {
                                drawFlower(ctx, 0, 0, patternSize, '#ffaaaa');
                             } else {
                                drawGeometric(ctx, 0, 0, patternSize, randColor());
                             }
                         }
                         ctx.restore();
                    }
                }
            }
            else if (layoutMode === 'scatter') {
                // 散点布局
                 ctx.fillStyle = userC1;
                 ctx.fillRect(0,0,size,size);
                 
                 for(let i=0; i<150; i++) {
                     const cx = Math.random() * size;
                     const cy = Math.random() * size;
                     const scale = Math.random() * 0.5 + 0.5;
                     
                     ctx.save();
                     ctx.translate(cx, cy);
                     ctx.scale(scale, scale);
                     ctx.rotate(Math.random() * Math.PI);
                     
                     drawMotifRow(0, 60, shape, randColor(), -50, 50); // Reuse logic
                     
                     ctx.restore();
                 }
            }
            else { // diagonal
                // 斜向纹样
                 ctx.fillStyle = userC1;
                 for(let i=-size; i<size*2; i+=40) {
                     const color = randColor();
                     ctx.fillStyle = color;
                     ctx.beginPath();
                     ctx.moveTo(i, 0); ctx.lineTo(i+20, 0); ctx.lineTo(i-size+20, size); ctx.lineTo(i-size, size);
                     ctx.fill();
                     
                     // occasionally draw motif
                     if(i%120===0) {
                         ctx.save();
                         ctx.translate(i%size, (i+200)%size);
                         ctx.fillStyle='#fff';
                         ctx.fillRect(0,0,20,20);
                         ctx.restore();
                     }
                 }
            }
            
            // 4. 更新纹理
            if (generatorTexture) generatorTexture.dispose();
            generatorTexture = new THREE.CanvasTexture(canvas);
            generatorTexture.colorSpace = THREE.SRGBColorSpace;
            generatorTexture.anisotropy = 8;
            
            if (generatorPlane) {
                // 更新现有材质属性
                if (Array.isArray(generatorPlane.material)) { // 多材质支持
                    generatorPlane.material.forEach(m => {
                        m.map = generatorTexture;
                        m.bumpMap = generatorTexture;
                        m.side = THREE.DoubleSide; // 确保双面
                        m.needsUpdate = true;
                    });
                } else {
                    generatorPlane.material.map = generatorTexture;
                    generatorPlane.material.bumpMap = generatorTexture;
                    generatorPlane.material.side = THREE.DoubleSide; // 确保双面
                    generatorPlane.material.needsUpdate = true;
                }
                
                // 动画反馈
                new TWEEN.Tween(generatorPlane.scale)
                    .to({ x: 1.1, y: 1.1 }, 100).yoyo(true).repeat(1).start();
                    
            } else {
                // 创建展示面片
                // [修改] 增大尺寸以匹配 FOV 35 的文化模式
                const geo = new THREE.PlaneGeometry(50, 50); // 50x50
                const mat = new THREE.MeshStandardMaterial({ 
                    map: generatorTexture,
                    side: THREE.DoubleSide, 
                    roughness: 0.65,
                    metalness: 0.1,
                    bumpMap: generatorTexture,
                    bumpScale: 0.05
                });
                generatorPlane = new THREE.Mesh(geo, mat);
                generatorPlane.position.set(0, 0, 0); 
                
                // 边框装饰 (Frame) - 适配 50x50
                // 边框比画作大一点点 (51x51)，厚度增加看起来更有质感
                const frameGeo = new THREE.BoxGeometry(51, 51, 1.0);
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.9, name: 'Frame' });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                // 边框放在画作后面
                frame.position.z = -0.55; 
                generatorPlane.add(frame);
                
                // 标记为生成器对象，避免在 animate 中旋转
                generatorPlane.userData.isGenerator = true;
                
                scene.add(generatorPlane);
                activeModel = generatorPlane;
            }
            // showToast("黎锦图案已生成！");
        }

        // --- UI 收起/展开逻辑 ---
        function initUICollapse() {
            const uiLayer = document.getElementById('ui-layer');
            const btn = document.getElementById('btn-ui-collapse'); 
            const navBar = document.getElementById('nav-bar');
            
            if(!uiLayer || !btn) return;
            
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                const isCollapsed = uiLayer.classList.toggle('collapsed');
                
                // 联动导航栏
                // 使用 CSS 类名而非直接样式，利用 CSS transition 实现动画
                if(isCollapsed) {
                    navBar.classList.add('hidden-down');
                } else {
                    navBar.classList.remove('hidden-down');
                }
            });
        }

        // 初始化
        try {
            setupControls();
            initLandingPage();
            initGenerator();
            initAnnotations(); 
            initUICollapse(); // 初始化 UI 折叠
            
            // Start loop
            animate();
            console.log("[App] Initialization complete.");
        } catch(e) {
            showToast("初始化崩溃: " + e.message);
            console.error(e);
        }

    </script>
</body>
